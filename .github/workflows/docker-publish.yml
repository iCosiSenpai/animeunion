name: Docker Publish

# ─────────────────────────────────────────────────────────────────────────────
# PLACEHOLDER (Settimana 0).
#
# I Dockerfile di apps/api e apps/web non esistono ancora (arrivano in S7).
# Per non rendere la CI rossa, questo workflow NON si attiva sui push a `main`:
# parte solo manualmente (workflow_dispatch) o su tag di versione `v*`, che non
# verranno creati finché le immagini non saranno pronte.
#
# La struttura buildx multi-arch qui sotto è quella definitiva e verrà
# completata/attivata in Settimana 7.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build multi-arch & push to GHCR
    runs-on: ubuntu-latest
    # Guardia di sicurezza: finché i Dockerfile non esistono, il job è disattivato.
    if: ${{ vars.DOCKER_PUBLISH_ENABLED == 'true' }}
    strategy:
      matrix:
        app: [api, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./apps/${{ matrix.app }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/icosisenpai/animeunion-${{ matrix.app }}:latest
            ghcr.io/icosisenpai/animeunion-${{ matrix.app }}:${{ github.ref_name }}
