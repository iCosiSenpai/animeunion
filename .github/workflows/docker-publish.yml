name: Docker Publish

# ─────────────────────────────────────────────────────────────────────────────
# Build multi-arch (amd64 + arm64) delle immagini api/web e push su GHCR.
# Si attiva manualmente (workflow_dispatch) o su tag di versione `v*`.
# Guardia: il job parte solo se la repo variable DOCKER_PUBLISH_ENABLED == 'true'.
# Il context di build è la ROOT del repo (monorepo npm workspaces); il Dockerfile
# è in apps/<app>/Dockerfile.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build multi-arch & push to GHCR
    runs-on: ubuntu-latest
    # Guardia di sicurezza: finché i Dockerfile non esistono, il job è disattivato.
    if: ${{ vars.DOCKER_PUBLISH_ENABLED == 'true' }}
    strategy:
      matrix:
        app: [api, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/icosisenpai/animeunion-${{ matrix.app }}:latest
            ghcr.io/icosisenpai/animeunion-${{ matrix.app }}:${{ github.ref_name }}
