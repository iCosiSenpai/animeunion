# ─────────────────────────────────────────────────────────────────────────────
# AnimeUnion Docker — docker-compose
#
# Avvio:  cp .env.example .env  &&  docker compose up -d --build
# Web:    http://localhost:${WEB_PORT:-7979}
#
# LOGIN: al primo avvio la web UI mostra una schermata di accesso. Puoi:
#   - lasciare ANIMEUNION_EMAIL/PASSWORD vuote in .env e accedere dalla web UI
#     (email/password OPPURE Google/Discord), oppure
#   - compilarle in .env per l'auto-login.
# I token API vengono generati al primo accesso e salvati in SQLite (mai qui).
# ─────────────────────────────────────────────────────────────────────────────

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    # Nessuna porta pubblicata sull'host: il web raggiunge l'API sulla rete interna
    # (http://api:3001). Esponila solo se ti serve fare debug dall'host, scegliendo
    # una porta host libera, es: ports: ['3011:3001'].
    expose:
      - '3001'
    volumes:
      - ./data:/data # database SQLite + token
      - ${DOWNLOAD_PATH:-./anime}:/data/anime # libreria download (= animePath di default)
    env_file:
      - .env # ANIMEUNION_EMAIL/PASSWORD (opzionali), MAI committare!
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/data/animeunion.db
      - SOURCE_MODE=${SOURCE_MODE:-api}
      - ANIMEUNION_API_URL=${ANIMEUNION_API_URL:-https://api.animeunion.tv/api/v1/integration}
      - TZ=Europe/Rome
      - LOG_LEVEL=${LOG_LEVEL:-info}

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Indirizzo interno dell'API (nome-servizio compose). "Cotto" nel build.
        API_URL: http://api:3001
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-7979}:3000'
    depends_on:
      api:
        condition: service_healthy
